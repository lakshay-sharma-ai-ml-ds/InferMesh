global:
  scrape_interval: 5s
  evaluation_interval: 5s
  external_labels:
    cluster: "infermesh-dev"

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "infermesh"
    static_configs:
      - targets: ["infermesh:8000"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
