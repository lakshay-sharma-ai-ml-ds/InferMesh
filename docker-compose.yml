version: "3.9"

services:
  infermesh:
    build: .
    container_name: infermesh
    ports:
      - "8000:8000"   # REST API
      - "50051:50051" # gRPC
    environment:
      - INFERMESH_ENV=development
      - INFERMESH_LOG_LEVEL=INFO
      - INFERMESH_NUM_SIMULATED_GPUS=4
      - INFERMESH_REDIS_URL=redis://redis:6379/0
      - INFERMESH_PROMETHEUS_PORT=8000
    volumes:
      - ./results:/app/results
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - infermesh-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: infermesh-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - infermesh-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: infermesh-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - infermesh-net
    depends_on:
      - infermesh
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: infermesh-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=infermesh
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - infermesh-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  infermesh-net:
    driver: bridge
